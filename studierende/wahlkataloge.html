<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8"/>
    <title>Kursportal</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="container">
      <header>
        <img src="../assets/logo/Hochschule_Düsseldorf_logo.png" class="logo"/>
        <h1>Bewerbung für Wahlangebote</h1>
      </header>        
      

        <div class="titel_content">
          <h2>Wahlkataloge</h2>
          <button class="filter-btn">▼ Filter</button>
      </div>

      <main>
        <!--Informatikprojekt-->
        <div class="bereich">
          <button class="bereich_header">
            <span>Informatikprojekt 1/2</span>
            <spam class="pfeil">▼</spam>
          </button>

        </div>

        <!--Wahlkatalog A/C-->
        <div class="bereich">
          <button class="bereich_header">
            <span>Wahlkatalog A/C</span>
            <spam class="pfeil">▼</spam>
          </button>

          <div class="bereich_kontext">
            <div class="karten">
              <article class="card">
                <img/>
                <div class="card-body">
                   <h3>Interaktive Systeme</h3>
                      <p>
                        In einem Mini-Projekt werden kleine Android Apps erstellt.
                      </p>
                      <p>Plätze</p>
                      <p>0 / 20</p>

                      <div class="tags">
                        <span>SoSe</span>
                        <span>Klausur</span>
                        <span>Projekt</span>
                      </div>
                      <a href="" class="btn">Details</a>
                </div>
              </article>
              <article class="card">
                <img/>
                <div class="card-body">
                   <h3>Mobile Anwendung</h3>
                      <p>
                        ...
                      </p>
                      <p>Plätze</p>
                      <p>0 / 20</p>

                      <div class="tags">
                        <span>SoSe</span>
                        <span>Klausur</span>
                        <span>Projekt</span>
                      </div>
                      <a href="" class="btn">Details</a>
                </div>
              </article>
            </div>
          </div>
        </div>

        <!--Wahlkatalog B/D-->
        <div class="bereich">
          <button class="bereich_header">
            <span>Wahlkatalog B/D</span>
            <spam class="pfeil">▼</spam>
          </button>
        </div>

        <!--Medienprojekt A/B-->
        <div class="bereich">
          <button class="bereich_header">
            <span>Medienprojekt A/B</span>
            <spam class="pfeil">▼</spam>
          </button>
        </div>

        <a href="bewerbungsportal.html" class="back">Zurück zur Modulübersicht</a>
      </main>
      
    </div>
  </body>
</html>
